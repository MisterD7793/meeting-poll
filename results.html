<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Poll — Results</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1714;
    --muted: #7A736B;
    --always: #2D6A4F;
    --always-bg: #D8F3DC;
    --always-border: #95D5A8;
    --sometimes: #B5700A;
    --sometimes-bg: #FFF0D6;
    --sometimes-border: #FFCC7A;
    --never: #9B2C2C;
    --never-bg: #FDE8E8;
    --never-border: #F9AAAA;
    --accent: #2C4A7C;
    --accent-bg: #E8EDF5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }
  .container { max-width: 960px; margin: 0 auto; }

  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
  }
  .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 0.75rem;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-error { color: var(--never); font-size: 13px; margin-top: 0.5rem; min-height: 18px; }

  #dashboard { display: none; }

  .dash-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .dash-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
  }
  .dash-header p { color: var(--muted); font-size: 14px; margin-top: 0.25rem; }
  .refresh-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
  .stat-value { font-size: 22px; font-weight: 500; }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
  }
  .legend {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .grid-wrap {
    overflow-x: auto;
    margin-bottom: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 0.75rem 0.5rem;
    text-align: center;
    font-weight: 500;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  thead th:first-child {
    text-align: left;
    padding-left: 1.25rem;
    width: 145px;
  }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  tbody td {
    padding: 6px 4px;
    vertical-align: middle;
    text-align: center;
  }
  tbody td:first-child {
    text-align: left;
    padding-left: 1.25rem;
    font-weight: 500;
    font-size: 13px;
    white-space: nowrap;
  }
  tbody td:first-child span {
    display: block;
    font-weight: 400;
    font-size: 11px;
    color: var(--muted);
  }

  .cell {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-width: 88px;
    border-radius: 8px;
    padding: 7px 4px;
    cursor: pointer;
    transition: transform 0.1s;
    border: 1px solid transparent;
  }
  .cell:hover { transform: scale(1.05); }
  .cell.na, .cell.empty { background: var(--bg); border-color: var(--border); cursor: default; }
  .cell.na:hover, .cell.empty:hover { transform: none; }
  .cell.high     { background: #D8F3DC; border-color: #95D5A8; }
  .cell.mid      { background: #FFF0D6; border-color: #FFCC7A; }
  .cell.low      { background: #FDE8E8; border-color: #F9AAAA; }
  .cell.zero     { background: var(--bg); border-color: var(--border); }

  .cell-score { font-size: 16px; font-weight: 500; line-height: 1; }
  .cell.high .cell-score   { color: #2D6A4F; }
  .cell.mid .cell-score    { color: #B5700A; }
  .cell.low .cell-score    { color: #9B2C2C; }
  .cell.zero .cell-score   { color: var(--muted); }
  .cell.na .cell-score     { color: var(--muted); }

  .cell-counts {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
    text-align: center;
  }

  /* Popup */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .popup-overlay.open { display: flex; }
  .popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    position: relative;
  }
  .popup-close {
    position: absolute;
    top: 0.9rem; right: 0.9rem;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .popup-close:hover { background: var(--bg); }
  .popup-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    font-weight: 400;
    margin-bottom: 0.2rem;
  }
  .popup-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 1rem; }

  .popup-score-bar {
    display: flex;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .psb-always    { background: #52B788; }
  .psb-sometimes { background: #F4A621; }
  .psb-never     { background: #E07070; }
  .psb-blank     { background: var(--border); }

  .popup-group { margin-bottom: 1rem; }
  .popup-group:last-child { margin-bottom: 0; }
  .popup-group-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.5rem;
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }
  .lbl-always    { background: var(--always-bg);    color: var(--always); }
  .lbl-sometimes { background: var(--sometimes-bg); color: var(--sometimes); }
  .lbl-never     { background: var(--never-bg);     color: var(--never); }
  .lbl-blank     { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .popup-names { display: flex; flex-wrap: wrap; gap: 6px; }
  .name-chip {
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }

  .respondents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 2rem;
  }
  .respondent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .resp-dot { width: 8px; height: 8px; border-radius: 50%; background: #52B788; flex-shrink: 0; }
  .resp-date { font-size: 11px; color: var(--muted); }

  .no-data { color: var(--muted); font-size: 14px; padding: 1rem 0; }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>Results dashboard</h1>
    <p>Enter the password to view responses</p>
    <input type="password" id="pw-input" placeholder="••••••••" />
    <button class="login-btn" onclick="checkPassword()">View results</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="container">
  <div id="dashboard">

    <div class="dash-header">
      <div>
        <h1>Availability results</h1>
        <p id="subtitle">Loading…</p>
      </div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div style="margin-bottom:2.5rem">
      <div class="section-title">Availability grid</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#95D5A8"></div>≥70% strong</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FFCC7A"></div>40–69% possible</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F9AAAA"></div>&lt;40% weak</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E2DDD6"></div>no data / n/a</div>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:0.75rem">Click any cell to see who said what.</p>
      <div class="grid-wrap"><table id="grid-table"></table></div>
    </div>

    <div>
      <div class="section-title">Respondents</div>
      <div class="respondents-grid" id="respondents-grid"></div>
    </div>

  </div>
</div>

<div class="popup-overlay" id="popup-overlay" onclick="maybeClose(event)">
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopup()">×</button>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-subtitle" id="popup-subtitle"></div>
    <div class="popup-score-bar" id="popup-bar"></div>
    <div id="popup-body"></div>
  </div>
</div>

<script>
const PASSWORD = 'Schedule!';
const SUPABASE_URL = 'https://eqpqtswfkfmukzuhenjt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxcHF0c3dma2ZtdWt6dWhlbmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTgwNzUsImV4cCI6MjA5NDE3NDA3NX0.jk1dbvSxwoSiOFFA7CeNJbJItXmJeDebU2D9rGtfvVA';

const SLOTS = [
  { id: 'morning',    name: 'Morning',                time: '9–11 am' },
  { id: 'early_aftn', name: 'Early Afternoon',        time: '12–3 pm' },
  { id: 'afternoon',  name: 'Afternoon',              time: '3–6 pm' },
  { id: 'evening',    name: 'Evening / After Dinner', time: '8–10 pm' },
];
const DAYS = [
  { id: 'sun', label: 'Sunday' },
  { id: 'mon', label: 'Monday' },
  { id: 'tue', label: 'Tuesday' },
  { id: 'wed', label: 'Wednesday' },
  { id: 'thu', label: 'Thursday' },
  { id: 'fri', label: 'Friday' },
];
const FRI_SLOTS = ['morning', 'early_aftn'];

let allRows = [];

function wid(dayId, slotId) { return `${dayId}_${slotId}`; }

function calcScore(c, total) {
  if (!total) return 0;
  return (c.always * 2 + c.sometimes) / (total * 2) * 100;
}

function cellClass(s, total) {
  if (!total) return 'empty';
  if (s >= 70) return 'high';
  if (s >= 40) return 'mid';
  if (s > 0)   return 'low';
  return 'zero';
}

function checkPassword() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/responses?select=*&order=submitted_at.asc`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    allRows = await res.json();
    render(allRows);
  } catch(e) {
    document.getElementById('subtitle').textContent = 'Error loading data.';
  }
}

function tally(rows) {
  const counts = {}, names = {};
  DAYS.forEach(day => {
    const slots = day.id === 'fri' ? FRI_SLOTS : SLOTS.map(s => s.id);
    slots.forEach(sid => {
      const k = wid(day.id, sid);
      counts[k] = { always: 0, sometimes: 0, never: 0, blank: 0 };
      names[k]  = { always: [], sometimes: [], never: [], blank: [] };
    });
  });
  rows.forEach(row => {
    const av = row.availability || {};
    Object.keys(counts).forEach(k => {
      const v = av[k];
      const bucket = (v === 'always' || v === 'sometimes' || v === 'never') ? v : 'blank';
      counts[k][bucket]++;
      names[k][bucket].push(row.name);
    });
  });
  return { counts, names };
}

function render(rows) {
  const total = rows.length;
  document.getElementById('subtitle').textContent =
    `${total} response${total !== 1 ? 's' : ''} · Updated ${new Date().toLocaleTimeString()}`;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Responses</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Windows</div><div class="stat-value">22</div></div>
    <div class="stat-card"><div class="stat-label">Scoring</div><div class="stat-value" style="font-size:13px;padding-top:6px">Always=2 · Sometimes=1</div></div>
  `;

  const { counts, names } = tally(rows);

  // Table
  const thead = `<thead><tr>
    <th>Time slot</th>
    ${DAYS.map(d => `<th>${d.label}</th>`).join('')}
  </tr></thead>`;

  const tbody = SLOTS.map(slot => {
    const cells = DAYS.map(day => {
      const isFri = day.id === 'fri';
      if (isFri && !FRI_SLOTS.includes(slot.id)) {
        return `<td><div class="cell na"><div class="cell-score" style="font-size:18px;color:var(--border)">—</div></div></td>`;
      }
      const k = wid(day.id, slot.id);
      const c = counts[k];
      const s = calcScore(c, total);
      const cls = cellClass(s, total);
      const scoreStr = total ? Math.round(s) + '%' : '—';
      const parts = [];
      if (c.always)    parts.push(`${c.always}✓`);
      if (c.sometimes) parts.push(`${c.sometimes}~`);
      if (c.never)     parts.push(`${c.never}✗`);
      const countStr = parts.length ? parts.join(' · ') : (total ? 'none' : '');
      return `<td><div class="cell ${cls}" onclick="openPopup('${k}')">
        <div class="cell-score">${scoreStr}</div>
        <div class="cell-counts">${countStr}</div>
      </div></td>`;
    }).join('');
    return `<tr>
      <td>${slot.name}<span>${slot.time}</span></td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('grid-table').innerHTML = thead + `<tbody>${tbody}</tbody>`;

  // Respondents
  const el = document.getElementById('respondents-grid');
  if (!total) {
    el.innerHTML = '<div class="no-data">No responses yet.</div>';
  } else {
    el.innerHTML = rows.map(r => {
      const when = new Date(r.submitted_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      return `<div class="respondent-card">
        <div class="resp-dot"></div>
        <div><div>${r.name}</div><div class="resp-date">${when}</div></div>
      </div>`;
    }).join('');
  }
}

function openPopup(k) {
  const total = allRows.length;
  const c = { always: 0, sometimes: 0, never: 0, blank: 0 };
  const n = { always: [], sometimes: [], never: [], blank: [] };
  allRows.forEach(row => {
    const v = (row.availability || {})[k];
    const bucket = (v === 'always' || v === 'sometimes' || v === 'never') ? v : 'blank';
    c[bucket]++; n[bucket].push(row.name);
  });

  const idx = k.indexOf("_"); const dayId = k.substring(0, idx); const slotId = k.substring(idx + 1);
  const day  = DAYS.find(d => d.id === dayId);
  const slot = SLOTS.find(s => s.id === slotId);
  if (!day || !slot) { console.error("Unknown key:", k, dayId, slotId); return; }
  const s = Math.round(calcScore(c, total));

  document.getElementById('popup-title').textContent = `${day.label} · ${slot.name}`;
  document.getElementById('popup-subtitle').textContent = `${slot.time} · Score: ${s}%`;

  const ap = total ? c.always/total*100 : 0;
  const sp = total ? c.sometimes/total*100 : 0;
  const np = total ? c.never/total*100 : 0;
  const bp = total ? c.blank/total*100 : 100;
  document.getElementById('popup-bar').innerHTML = `
    <div class="psb-always"    style="flex:${ap}"></div>
    <div class="psb-sometimes" style="flex:${sp}"></div>
    <div class="psb-never"     style="flex:${np}"></div>
    <div class="psb-blank"     style="flex:${bp}"></div>
  `;

  const groups = [
    { key: 'always',    label: 'Always',    cls: 'lbl-always' },
    { key: 'sometimes', label: 'Sometimes', cls: 'lbl-sometimes' },
    { key: 'never',     label: 'Never',     cls: 'lbl-never' },
    { key: 'blank',     label: 'No answer', cls: 'lbl-blank' },
  ];
  document.getElementById('popup-body').innerHTML = groups
    .filter(g => n[g.key].length)
    .map(g => `<div class="popup-group">
      <div class="popup-group-label ${g.cls}">${g.label} (${n[g.key].length})</div>
      <div class="popup-names">${n[g.key].map(nm => `<div class="name-chip">${nm}</div>`).join('')}</div>
    </div>`).join('');

  document.getElementById('popup-overlay').classList.add('open');
}

function maybeClose(e) { if (e.target.id === 'popup-overlay') closePopup(); }
function closePopup() { document.getElementById('popup-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });
</script>
</body>
</html>
