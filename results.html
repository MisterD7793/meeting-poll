<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Poll — Results</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1714;
    --muted: #7A736B;
    --always: #2D6A4F;
    --always-bg: #D8F3DC;
    --always-border: #95D5A8;
    --sometimes: #B5700A;
    --sometimes-bg: #FFF0D6;
    --sometimes-border: #FFCC7A;
    --never: #9B2C2C;
    --never-bg: #FDE8E8;
    --never-border: #F9AAAA;
    --accent: #2C4A7C;
    --accent-bg: #E8EDF5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 4rem;
  }
  .container { max-width: 860px; margin: 0 auto; }

  /* Login */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    margin-bottom: 0.4rem;
  }
  .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 0.75rem;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-error { color: var(--never); font-size: 13px; margin-top: 0.5rem; min-height: 18px; }

  /* Dashboard */
  #dashboard { display: none; }
  header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    line-height: 1.2;
  }
  header p { color: var(--muted); font-size: 14px; margin-top: 0.25rem; }
  .refresh-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1rem;
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
  .stat-value { font-size: 22px; font-weight: 500; }

  /* Top picks */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
  }
  .top-picks {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .pick-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .pick-row.gold { border-color: #FFCC7A; background: #FFFBF0; }
  .pick-rank {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    width: 24px;
    flex-shrink: 0;
    text-align: center;
  }
  .pick-rank.first { color: #B5700A; font-size: 16px; }
  .pick-name {
    flex: 1;
  }
  .pick-name strong { font-size: 15px; font-weight: 500; display: block; }
  .pick-name span { font-size: 12px; color: var(--muted); }
  .pick-score {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pick-bars {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .pick-bar {
    height: 20px;
    border-radius: 3px;
    min-width: 4px;
    font-size: 10px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    padding: 0 4px;
  }

  /* Full grid */
  .grid-section { margin-bottom: 2rem; }
  .day-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .day-header {
    padding: 0.65rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
  }
  .slot-rows { padding: 0.5rem 1.25rem 0.75rem; display: flex; flex-direction: column; gap: 6px; }
  .slot-result-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .slot-result-label {
    width: 180px;
    flex-shrink: 0;
  }
  .slot-result-label strong { font-size: 13px; font-weight: 500; display: block; }
  .slot-result-label span { font-size: 11px; color: var(--muted); }
  .bar-track {
    flex: 1;
    height: 22px;
    border-radius: 5px;
    background: var(--bg);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
  }
  .bar-seg {
    height: 100%;
    transition: width 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    min-width: 0;
    overflow: hidden;
  }
  .bar-always   { background: #52B788; }
  .bar-sometimes{ background: #F4A621; }
  .bar-never    { background: #E07070; }
  .bar-blank    { background: var(--border); }
  .slot-score-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    width: 52px;
    text-align: center;
  }
  .pill-high   { background: var(--always-bg);    color: var(--always);    border: 1px solid var(--always-border); }
  .pill-mid    { background: var(--sometimes-bg); color: var(--sometimes); border: 1px solid var(--sometimes-border); }
  .pill-low    { background: var(--never-bg);     color: var(--never);     border: 1px solid var(--never-border); }
  .pill-zero   { background: var(--bg);           color: var(--muted);     border: 1px solid var(--border); }

  /* Respondents */
  .respondents-section { margin-bottom: 2rem; }
  .respondents-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .respondent-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .respondent-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #52B788;
    flex-shrink: 0;
  }

  .loading { color: var(--muted); font-size: 14px; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>Results dashboard</h1>
    <p>Enter the password to view responses</p>
    <input type="password" id="pw-input" placeholder="••••••••" />
    <button class="login-btn" onclick="checkPassword()">View results</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="container">
  <div id="dashboard">
    <header>
      <div>
        <h1>Availability results</h1>
        <p id="subtitle">Loading…</p>
      </div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </header>

    <div class="stats-row" id="stats-row"></div>

    <div class="top-picks-section" style="margin-bottom:2rem">
      <div class="section-title">Top windows</div>
      <div class="top-picks" id="top-picks"></div>
    </div>

    <div class="grid-section">
      <div class="section-title">All windows</div>
      <div id="full-grid"></div>
    </div>

    <div class="respondents-section">
      <div class="section-title">Respondents</div>
      <div class="respondents-list" id="respondents-list"></div>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'Schedule!';
const SUPABASE_URL = 'https://eqpqtswfkfmukzuhenjt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxcHF0c3dma2ZtdWt6dWhlbmp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTgwNzUsImV4cCI6MjA5NDE3NDA3NX0.jk1dbvSxwoSiOFFA7CeNJbJItXmJeDebU2D9rGtfvVA';

const SLOTS = [
  { id: 'morning',    name: 'Morning',               time: '9–11 am' },
  { id: 'early_aftn', name: 'Early Afternoon',       time: '12–3 pm' },
  { id: 'afternoon',  name: 'Afternoon',             time: '3–6 pm' },
  { id: 'evening',    name: 'Evening / After Dinner', time: '8–10 pm' },
];
const DAYS = [
  { id: 'sun', label: 'Sunday',    slots: ['morning','early_aftn','afternoon','evening'] },
  { id: 'mon', label: 'Monday',    slots: ['morning','early_aftn','afternoon','evening'] },
  { id: 'tue', label: 'Tuesday',   slots: ['morning','early_aftn','afternoon','evening'] },
  { id: 'wed', label: 'Wednesday', slots: ['morning','early_aftn','afternoon','evening'] },
  { id: 'thu', label: 'Thursday',  slots: ['morning','early_aftn','afternoon','evening'] },
  { id: 'fri', label: 'Friday',    slots: ['morning','early_aftn'] },
];

function windowId(dayId, slotId) { return `${dayId}_${slotId}`; }
function windowLabel(dayId, slotId) {
  const day = DAYS.find(d => d.id === dayId);
  const slot = SLOTS.find(s => s.id === slotId);
  return { day: day.label, slot: slot.name, time: slot.time };
}

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

async function loadData() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/responses?select=*&order=submitted_at.asc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const rows = await res.json();
    render(rows);
  } catch(e) {
    document.getElementById('subtitle').textContent = 'Error loading data.';
  }
}

function score(counts, total) {
  if (total === 0) return 0;
  return (counts.always * 2 + counts.sometimes * 1) / (total * 2) * 100;
}

function render(rows) {
  const total = rows.length;
  document.getElementById('subtitle').textContent =
    `${total} response${total !== 1 ? 's' : ''} · Last updated ${new Date().toLocaleTimeString()}`;

  // Stats
  const statsEl = document.getElementById('stats-row');
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-label">Responses</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Windows polled</div><div class="stat-value">22</div></div>
    <div class="stat-card"><div class="stat-label">Scoring</div><div class="stat-value" style="font-size:14px;padding-top:4px">Always=2 · Sometimes=1</div></div>
  `;

  // Tally all windows
  const tally = {};
  DAYS.forEach(day => {
    day.slots.forEach(slotId => {
      const wid = windowId(day.id, slotId);
      tally[wid] = { always: 0, sometimes: 0, never: 0, blank: 0 };
    });
  });

  rows.forEach(row => {
    const av = row.availability || {};
    Object.entries(tally).forEach(([wid, counts]) => {
      const val = av[wid];
      if (val === 'always') counts.always++;
      else if (val === 'sometimes') counts.sometimes++;
      else if (val === 'never') counts.never++;
      else counts.blank++;
    });
  });

  // Score and rank
  const ranked = Object.entries(tally).map(([wid, counts]) => {
    const [dayId, slotId] = wid.split(/_(?=[^_]+$)/);
    const s = score(counts, total);
    return { wid, dayId, slotId, counts, score: s };
  }).sort((a, b) => b.score - a.score);

  // Top picks
  const topEl = document.getElementById('top-picks');
  if (total === 0) {
    topEl.innerHTML = '<div class="loading">No responses yet.</div>';
  } else {
    topEl.innerHTML = ranked.slice(0, 5).map((item, i) => {
      const lbl = windowLabel(item.dayId, item.slotId);
      const pct = Math.round(item.score);
      const isFirst = i === 0;
      const alwaysPct = total ? Math.round(item.counts.always / total * 100) : 0;
      const sometimesPct = total ? Math.round(item.counts.sometimes / total * 100) : 0;
      const neverPct = total ? Math.round(item.counts.never / total * 100) : 0;
      return `<div class="pick-row ${isFirst ? 'gold' : ''}">
        <div class="pick-rank ${isFirst ? 'first' : ''}">${isFirst ? '★' : i + 1}</div>
        <div class="pick-name">
          <strong>${lbl.day} · ${lbl.slot}</strong>
          <span>${lbl.time}</span>
        </div>
        <div class="pick-bars">
          ${item.counts.always ? `<div class="pick-bar" style="background:#52B788;width:${alwaysPct * 0.6 + 16}px">${item.counts.always}</div>` : ''}
          ${item.counts.sometimes ? `<div class="pick-bar" style="background:#F4A621;width:${sometimesPct * 0.6 + 16}px">${item.counts.sometimes}</div>` : ''}
          ${item.counts.never ? `<div class="pick-bar" style="background:#E07070;width:${neverPct * 0.6 + 16}px">${item.counts.never}</div>` : ''}
        </div>
        <div class="pick-score">${pct}%</div>
      </div>`;
    }).join('');
  }

  // Full grid
  const gridEl = document.getElementById('full-grid');
  const maxScore = ranked.length ? ranked[0].score : 1;
  gridEl.innerHTML = DAYS.map(day => {
    const slotRows = day.slots.map(slotId => {
      const wid = windowId(day.id, slotId);
      const counts = tally[wid];
      const slot = SLOTS.find(s => s.id === slotId);
      const s = score(counts, total);
      const pillClass = s >= 70 ? 'pill-high' : s >= 40 ? 'pill-mid' : s > 0 ? 'pill-low' : 'pill-zero';
      const alwaysPct  = total ? counts.always   / total * 100 : 0;
      const somesPct   = total ? counts.sometimes / total * 100 : 0;
      const neverPct   = total ? counts.never     / total * 100 : 0;
      const blankPct   = total ? counts.blank     / total * 100 : 100;
      return `<div class="slot-result-row">
        <div class="slot-result-label">
          <strong>${slot.name}</strong>
          <span>${slot.time}</span>
        </div>
        <div class="bar-track">
          <div class="bar-seg bar-always"    style="width:${alwaysPct}%">${alwaysPct >= 12 ? counts.always : ''}</div>
          <div class="bar-seg bar-sometimes" style="width:${somesPct}%">${somesPct >= 12 ? counts.sometimes : ''}</div>
          <div class="bar-seg bar-never"     style="width:${neverPct}%">${neverPct >= 12 ? counts.never : ''}</div>
          <div class="bar-seg bar-blank"     style="width:${blankPct}%"></div>
        </div>
        <div class="slot-score-pill ${pillClass}">${total ? Math.round(s) + '%' : '—'}</div>
      </div>`;
    }).join('');
    return `<div class="day-block">
      <div class="day-header">${day.label}</div>
      <div class="slot-rows">${slotRows}</div>
    </div>`;
  }).join('');

  // Respondents
  const respEl = document.getElementById('respondents-list');
  if (total === 0) {
    respEl.innerHTML = '<span style="color:var(--muted);font-size:14px">No responses yet.</span>';
  } else {
    respEl.innerHTML = rows.map(r =>
      `<div class="respondent-chip"><div class="dot"></div>${r.name}</div>`
    ).join('');
  }
}
</script>
</body>
</html>
